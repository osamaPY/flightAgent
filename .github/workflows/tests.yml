name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run offline tests
        # test_apis.py is a live provider health probe (needs network); the
        # rest of the suite is fully offline and deterministic.
        run: python -m pytest -q --ignore=tests/test_apis.py
